services:
  gateway:
    build: ./gateway
    ports:
      - "8000:8000"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8001
      EVENTS_SERVICE_URL: http://events-service:8002
      BOOKING_SERVICE_URL: http://booking-service:8003
      CONSUL_HTTP_ADDR: http://consul:8500
    depends_on:
      - auth-service
      - events-service
      - booking-service
      - consul

  auth-service:
    build: ./auth-service
    ports:
      - "8001:8001"
    environment:
      CONSUL_HTTP_ADDR: http://consul:8500
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-token
      JWT_SECRET: local-fallback-secret
    depends_on:
      - consul
      - vault

  events-service:
    build: ./events-service
    ports:
      - "8002:8002"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8001
      CONSUL_HTTP_ADDR: http://consul:8500
    depends_on:
      - auth-service
      - consul

  booking-service:
    build: ./booking-service
    ports:
      - "8003:8003"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8001
      EVENTS_SERVICE_URL: http://events-service:8002
      CONSUL_HTTP_ADDR: http://consul:8500
      KAFKA_BROKER: kafka:9092
      BOOKINGS_TOPIC: booking.created
    depends_on:
      - auth-service
      - events-service
      - kafka
      - consul

  notification-service:
    build: ./notification-service
    ports:
      - "8004:8004"
    environment:
      CONSUL_HTTP_ADDR: http://consul:8500
      KAFKA_BROKER: kafka:9092
      BOOKINGS_TOPIC: booking.created
    depends_on:
      - kafka
      - consul

  consul:
    image: hashicorp/consul:1.20
    ports:
      - "8500:8500"
    command: agent -dev -client=0.0.0.0

  vault:
    image: hashicorp/vault:1.17
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    command: server -dev

  vault-init:
    image: hashicorp/vault:1.17
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-token
    command: sh -c "sleep 3 && vault kv put secret/event-booking/auth jwt_secret=from-vault-dev-secret"
    depends_on:
      - vault

  kafka:
    image: bitnami/kafka:3.8
    ports:
      - "9094:9094"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      ALLOW_PLAINTEXT_LISTENER: "yes"
